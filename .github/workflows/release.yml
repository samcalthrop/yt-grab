name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: yt-grab-linux
          - os: macos-latest
            target: x86_64-apple-darwin
            binary_name: yt-grab-macos
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: yt-grab-windows.exe
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Rust binary
        run: cargo build --release --target ${{ matrix.target }}

      # ---------------- Unix bundle ----------------
      - name: Bundle yt-dlp and ffmpeg (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p portable/bin

          # yt-dlp
          curl -L -o portable/bin/yt-dlp \
            https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp

          # ffmpeg
          curl -L -o portable/bin/ffmpeg.tar.xz \
            https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz
          mkdir -p portable/bin/ffmpeg
          tar -xf portable/bin/ffmpeg.tar.xz -C portable/bin/ffmpeg --strip-components=1

          # Rust binary
          cp target/${{ matrix.target }}/release/yt-grab portable/bin/yt-grab
          chmod +x portable/bin/yt-grab yt-dlp ffmpeg/ffmpeg

          # Verify folder
          ls -R portable/bin

      # ---------------- Windows bundle ----------------
      - name: Bundle yt-dlp and ffmpeg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          mkdir portable\bin -Force

          # yt-dlp
          Invoke-WebRequest -Uri https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe -OutFile portable\bin\yt-dlp.exe

          # ffmpeg
          Invoke-WebRequest -Uri https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip -OutFile portable\bin\ffmpeg.zip
          Expand-Archive portable\bin\ffmpeg.zip portable\bin\ffmpeg

          # Rust binary
          Copy-Item target\${{ matrix.target }}\release\yt-grab.exe portable\bin\yt-grab.exe

          # Verify folder
          Get-ChildItem -Recurse portable\bin

      # ---------------- Create zip ----------------
      - name: Create release zip (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd portable/bin
          zip -r ../../yt-grab-${{ matrix.binary_name }}.zip ./*
          cd ../..

      - name: Create release zip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path portable\bin\* -DestinationPath yt-grab-${{ matrix.binary_name }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary_name }}
          path: yt-grab-${{ matrix.binary_name }}.zip

  publish_release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        with:
          files: yt-grab-*.zip
          overwrite_files: true
