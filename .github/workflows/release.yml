name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: yt-grab-linux
          - os: macos-latest
            target: x86_64-apple-darwin
            name: yt-grab-macos
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: yt-grab-windows.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Rename binary
        run: |
          mkdir dist
          cp target/release/yt-grab dist/${{ matrix.name }}
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/*

  release:
      needs: build
      runs-on: ubuntu-latest

      steps:
        - uses: actions/download-artifact@v4

        - uses: softprops/action-gh-release@v2
          with:
            files: |
              **/*
