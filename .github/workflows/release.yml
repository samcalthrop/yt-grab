name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read  # PAT will be used for release creation

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: yt-grab-linux
          - os: macos-latest
            target: x86_64-apple-darwin
            binary_name: yt-grab-macos
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: yt-grab-windows.exe

      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Bundle yt-dlp and ffmpeg
        shell: bash
        run: |
          mkdir -p portable/bin
          if [[ "$RUNNER_OS" != "Windows" ]]; then
            # Linux/macOS
            curl -L -o portable/bin/yt-dlp https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp
            curl -L -o portable/bin/ffmpeg.tar.xz https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz
            tar -xf portable/bin/ffmpeg.tar.xz -C portable/bin
            chmod +x portable/bin/yt-dlp
            chmod +x portable/bin/ffmpeg/ffmpeg
          fi

      - name: Bundle yt-dlp and ffmpeg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          mkdir -Force portable\bin
          Invoke-WebRequest -Uri https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe -OutFile portable\bin\yt-dlp.exe
          Invoke-WebRequest -Uri https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip -OutFile portable\bin\ffmpeg.zip
          Expand-Archive portable\bin\ffmpeg.zip -DestinationPath portable\bin\ffmpeg

      - name: Copy Rust binary to portable folder
        run: |
          mkdir -p portable/bin
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            cp target/${{ matrix.target }}/release/yt-grab.exe portable/bin/yt-grab.exe
          else
            cp target/${{ matrix.target }}/release/yt-grab portable/bin/yt-grab
          fi

      - name: Create release zip
        run: |
          cd portable
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            Compress-Archive -Path * -DestinationPath ../yt-grab-${{ matrix.binary_name }}.zip
          else
            zip -r ../yt-grab-${{ matrix.binary_name }}.zip .
          fi
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary_name }}
          path: yt-grab-${{ matrix.binary_name }}.zip

      - name: Show build output folder
        run: ls -R target

      - name: Build Rust binary
        run: cargo build --release --target ${{ matrix.target }} -v

  publish_release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        with:
          files: yt-grab-*.zip
