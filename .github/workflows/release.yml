name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read  # PAT will be used for release creation

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: yt-grab-linux
          - os: macos-latest
            target: x86_64-apple-darwin
            binary_name: yt-grab-macos
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: yt-grab-windows.exe

      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Rust binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Bundle yt-dlp and ffmpeg (UNIX)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p portable/bin
          curl -L -o portable/bin/yt-dlp https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp
          curl -L -o portable/bin/ffmpeg.tar.xz https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz
          mkdir -p portable/bin/ffmpeg
          tar -xf portable/bin/ffmpeg.tar.xz -C portable/bin/ffmpeg --strip-components=1
          cp target/${{ matrix.target }}/release/yt-grab portable/bin/yt-grab
          chmod +x portable/bin/yt-dlp portable/bin/yt-grab portable/bin/ffmpeg/ffmpeg

          ls -l portable/bin
          ls -l portable/bin/ffmpeg

      - name: Bundle yt-dlp and ffmpeg (WINDOWS)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          mkdir -Force portable\bin
          Invoke-WebRequest -Uri https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe -OutFile portable\bin\yt-dlp.exe
          Invoke-WebRequest -Uri https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip -OutFile portable\bin\ffmpeg.zip
          Expand-Archive portable\bin\ffmpeg.zip -DestinationPath portable\bin\ffmpeg

      - name: Copy Rust binary to portable folder (UNIX)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p portable/bin
          cp target/${{ matrix.target }}/release/yt-grab portable/bin/yt-grab

      - name: Copy Rust binary to portable folder (WINDOWS)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          mkdir -Force portable\bin
          Copy-Item -Path target\${{ matrix.target }}\release\yt-grab.exe -Destination portable\bin\yt-grab.exe

      - name: Create release zip (UNIX)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd portable/bin
          zip -r ../../yt-grab-${{ matrix.binary_name }}.zip ./*
          cd ../..

      - name: Create release zip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path portable\bin\* -DestinationPath yt-grab-${{ matrix.binary_name }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary_name }}
          path: yt-grab-${{ matrix.binary_name }}.zip

      - name: Show build output folder
        run: ls -R target

      - name: Build Rust binary
        run: cargo build --release --target ${{ matrix.target }} -v

  publish_release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        with:
          files: yt-grab-*.zip
