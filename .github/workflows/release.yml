name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            out: yt-grab-linux-x64

          - os: macos-latest
            target: x86_64-apple-darwin
            out: yt-grab-macos-x64

          - os: macos-latest
            target: aarch64-apple-darwin
            out: yt-grab-macos-arm64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            out: yt-grab-windows-x64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Copy binary (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/yt-grab ${{ matrix.out }}

      - name: Copy binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item target\${{ matrix.target }}\release\yt-grab.exe ${{ matrix.out }}

      - name: Upload to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.out }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
